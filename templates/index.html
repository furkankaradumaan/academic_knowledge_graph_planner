<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademik Bilgi Grafiği ve Asistanı</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #f4f6f9;
        }
        /* Sol Menü Tasarımı */
        #sidebar {
            width: 300px;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        h2 { margin-top: 0; color: #ecf0f1; border-bottom: 2px solid #34495e; padding-bottom: 10px; }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover { background-color: #2980b9; }
        #sort-btn { background-color: #2ecc71; }
        #sort-btn:hover { background-color: #27ae60; }
        
        /* Sağ Taraf - Grafik Alanı Tasarımı */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: calc(100% - 320px);
        }
        #cy {
            flex-grow: 1;
            background-color: #ffffff;
            border-bottom: 1px solid #dcdde1;
        }
        /* Önerilen Sıralama Paneli */
        #order-panel {
            height: 150px;
            background-color: #ffffff;
            padding: 15px;
            overflow-y: auto;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.05);
        }
        .order-item {
            display: inline-block;
            background-color: #e1b12c;
            color: white;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-color: #34495e;
            padding: 12px;
            border-radius: 8px;
        }
        .form-group h3 { margin: 0 0 5px 0; font-size: 14px; color: #ecf0f1; }
        .form-group input {
            padding: 8px;
            border-radius: 4px;
            border: none;
            font-size: 13px;
        }

    </style>
</head>
<body>

    <!-- SOL MENÜ -->
    <div id="sidebar">
        <h2>Akademik Asistan</h2>
        
        <!-- SİSTEM BUTONLARI -->
        <div style="display:flex; gap:10px;">
            <button id="refresh-btn" onclick="loadGraph()" style="flex:1;">🔄 Yenile</button>
            <button id="sort-btn" onclick="loadSorting()" style="flex:2;">🧠 Sırala</button>
        </div>
        
        <hr style="border: 1px solid #34495e; width:100%;">

        <!-- 1. FORM: DERS EKLE -->
        <div class="form-group">
            <h3>📚 Yeni Ders Ekle</h3>
            <input type="text" id="new-sub-name" placeholder="Örn: Lineer Cebir">
            <button onclick="submitSubject()">Ekle</button>
        </div>

        <!-- 2. FORM: KONU VEYA ALT KONU EKLE -->
        <div class="form-group">
            <h3>🟢 Yeni Konu / Alt Konu Ekle</h3>
            <input type="text" id="new-top-name" placeholder="Konu Adı (Örn: Matrisler)">
            <input type="text" id="belonging-sub" placeholder="Ait Olduğu Ders (Ana konuysa yaz)">
            <input type="text" id="parent-top" placeholder="Üst Konu Adı (Alt konuysa yaz)">
            <small style="color:#bdc3c7; font-size:11px;">*Ana konuysa sadece Ders adını, alt konuysa sadece Üst Konu adını girin.</small>
            <button onclick="submitTopic()" style="margin-top:5px;">Konuyu Ekle</button>
        </div>

        <!-- 3. FORM: ÖN KOŞUL BAĞLA -->
        <div class="form-group">
            <h3>🔗 Ön Koşul Bağlantısı Kur</h3>
            <input type="text" id="pre-first" placeholder="Önce Yapılacak Konu">
            <input type="text" id="pre-next" placeholder="Sonra Yapılacak Konu">
            <button onclick="submitPrerequisite()" style="background-color:#e74c3c;">Bağlantıyı Kur</button>
        </div>
    </div>

    <!-- SAĞ TARAF (GRAFİK VE SIRALAMA) -->
    <div id="main-content">
        <!-- Cytoscape Grafiğinin Çizileceği Alan -->
        <div id="cy"></div>
        
        <!-- Topolojik Sıralama Sonuçlarının Basılacağı Alan -->
        <div id="order-panel">
            <h3 style="margin-top:0; color:#2c3e50;">💡 Önerilen Akıllı Çalışma Sırası</h3>
            <div id="order-list">Butona basarak algoritmayı tetikleyin...</div>
        </div>
    </div>

    <!-- JAVASCRIPT / FLASK BAĞLANTI KATMANI -->
    <script>
        let cy;
                // 1. Ders Ekleme Tetikleyicisi
        async function submitSubject() {
            const nameInput = document.getElementById('new-sub-name');
            const name = nameInput.value.trim();
            if(!name) return alert("Ders adı girin!");

            const response = await fetch('/api/subject', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            });
            const resData = await response.json();
            if(response.ok) { nameInput.value = ""; loadGraph(); } 
            else alert(resData.error);
        }

        // 2. Konu/Alt Konu Ekleme Tetikleyicisi
        async function submitTopic() {
            const name = document.getElementById('new-top-name').value.trim();
            const subName = document.getElementById('belonging-sub').value.trim();
            const parentName = document.getElementById('parent-top').value.trim();
            if(!name) return alert("Konu adı girin!");

            const response = await fetch('/api/topic', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, subject_name: subName, main_topic_name: parentName })
            });
            const resData = await response.json();
            if(response.ok) {
                document.getElementById('new-top-name').value = "";
                document.getElementById('belonging-sub').value = "";
                document.getElementById('parent-top').value = "";
                loadGraph();
            } else alert(resData.error);
        }

        // 3. Ön Koşul Bağlama Tetikleyicisi
        async function submitPrerequisite() {
            const first = document.getElementById('pre-first').value.trim();
            const next = document.getElementById('pre-next').value.trim();
            if(!first || !next) return alert("İki konuyu da girmeniz gerekir!");

            const response = await fetch('/api/prerequisite', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name_first: first, name_next: next })
            });
            const resData = await response.json();
            if(response.ok) {
                document.getElementById('pre-first').value = "";
                document.getElementById('pre-next').value = "";
                loadGraph();
            } else alert(resData.error);
        }

        // 1. Fonksiyon: Python API'den verileri çekip ekrana grafik çizme
        async function loadGraph() {
            try {
                // Flask sunucumuzun yazdığımız API'sine istek atıyoruz
                const response = await fetch('/api/graph');
                const elements = await response.json();

                // Grafik kütüphanesini başlatıyoruz
                cy = cytoscape({
                    container: document.getElementById('cy'),
                    elements: elements,
                    style: [
                        // Konu Düğümleri (Topics) Tarzı
                        {
                            selector: 'node[type="TOPIC"]',
                            style: {
                                'background-color': '#2ecc71',
                                'label': 'data(label)',
                                'text-valign': 'center',
                                'color': '#fff',
                                'font-size': '12px',
                                'width': '80px',
                                'height': '80px'
                            }
                        },
                        // Ders Düğümleri (Subjects) Tarzı
                        {
                            selector: 'node[type="SUBJECT"]',
                            style: {
                                'background-color': '#3498db',
                                'label': 'data(label)',
                                'text-valign': 'center',
                                'color': '#fff',
                                'font-size': '14px',
                                'shape': 'rectangle',
                                'width': '150px',
                                'height': '70px'
                            }
                        },
                        {
                            selector: 'edge[label="PREREQUISITE"]',
                            style: {
                                'line-color': '#e74c3c', // Ön koşullar dikkat çeksin diye Kırmızı/Turuncu
                                'target-arrow-color': '#e74c3c',
                                'target-arrow-shape': 'triangle' // Ok işareti sadece ön koşulda olsun
                            }
                        },
                        // İÇERİR Çizgilerine Özel Renk (YENİ EKLENDİ)
                        {
                            selector: 'edge[label="INCLUDES"]',
                            style: {
                                'line-color': '#3498db', // Ders bağlantıları Mavi
                                'line-style': 'dashed', // Ders bağlantıları kesikli çizgi olsun ki ön koşulla karışmasın
                                'target-arrow-shape': 'none' // Ok işaretine gerek yok, hiyerarşik bağ
                            }
                        },
                        // Ön Koşul Çizgilerinin (Edges) Tarzı
                        {
                            selector: 'edge',
                            style: {
                                'width': 3,
                                'line-color': '#95a5a6',
                                'target-arrow-color': '#95a5a6',
                                'target-arrow-shape': 'triangle', // Ok işareti ekliyoruz
                                'curve-style': 'bezier',

                                'label': 'data(label)', // Python'dan gelen "label" verisini oku
                                'font-size': '10px',
                                'text-background-opacity': 1, // Yazının arkasını kapat ki çizgi yazıyı kesmesin
                                'text-background-color': '#ffffff',
                                'text-background-padding': '3px',
                                'color': '#333'
                            }
                        }
                    ],
                    // Grafiğin ekrandaki dağılım algoritması (Rastgele yerine çember düzeni)
                    layout: {
                        name: 'cose',
                        animate: false,
                        padding: 80,
                        nodeRepulsion: function( node ){ return 400000; }, // Düğümleri birbirinden uzaklaştırır
                        idealEdgeLength: function( edge ){ return 100; }
                    }
                });
            } catch (error) {
                console.error("Graf yüklenirken hata oluştu:", error);
            }
        }

        // 2. Fonksiyon: Python DFS Algoritmasını tetikleyip sıralamayı ekrana yazma
        async function loadSorting() {
            const orderListDiv = document.getElementById('order-list');
            orderListDiv.innerHTML = "Algoritma çalıştırılıyor...";
            
            try {
                const response = await fetch('/api/sort');
                const data = await response.json();

                if (data.error) {
                    orderListDiv.innerHTML = `<span style="color:red; font-weight:bold;">⚠️ Hata: ${data.error}</span>`;
                    return;
                }

                // Gelen sıralama listesini HTML etiketlerine dönüştürme
                orderListDiv.innerHTML = "";
                data.order.forEach((topicName, index) => {
                    orderListDiv.innerHTML += `<div class="order-item">${index + 1}. ${topicName}</div> ➔`;
                });
                orderListDiv.innerHTML = orderListDiv.innerHTML.slice(0, -2); // En sondaki oku siler
                
            } catch (error) {
                orderListDiv.innerHTML = "Sıralama alınırken bir hata oluştu.";
            }
        }

        // Sayfa ilk açıldığında grafiği otomatik yükle
        window.onload = loadGraph;
    </script>
</body>
</html>
